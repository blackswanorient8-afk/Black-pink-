function RGB(r, g, b) {
  return 'rgb(' + r + ',' + g + ',' + b + ')'
}
function rgb2color(r, g, b) {
  return rgb2hex(RGB(r, g, b))
}
function dec2hex(i) {
    var result = "0x"
   result = result + i.slice(1)
  return result
  }
function rgb2hex(rgb){
 rgb = rgb.match(/^rgba?[\s+]?\([\s+]?(\d+)[\s+]?,[\s+]?(\d+)[\s+]?,[\s+]?(\d+)[\s+]?/i);
 return (rgb && rgb.length === 4) ? "#" +
  ("0" + parseInt(rgb[1],10).toString(16)).slice(-2) +
  ("0" + parseInt(rgb[2],10).toString(16)).slice(-2) +
  ("0" + parseInt(rgb[3],10).toString(16)).slice(-2) : '';
}
function pRGB(r, g, b) {
  return 'rgb(' + r + '%,' + g + '%,' + b + '%)'
}
function RGBA(r, g, b, a) {
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')'
}
function randint(min, max) {
  return Math.floor(Math.random() * max) + min
}
function randoffset(off) {
  return randint(-off, off*2)
}
function distance(x1, y1, z1, x2, y2, z2) {
  d = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2) + Math.pow(z2 - z1, 2))
  return d
}
function rotateAround(point, center, angle) {
  angle = (angle) * (Math.PI/180); // Convert to radians
var rotatedX = Math.cos(angle) * (point.x - center.x) - Math.sin(angle) * (point.y-center.y) + center.x;
var rotatedY = Math.sin(angle) * (point.x - center.x) + Math.cos(angle) * (point.y - center.y) + center.y;
  return {x: rotatedX, y: rotatedY}
}

function createCanvasMaterial(color, size) {
  var matCanvas = document.createElement('canvas');
  matCanvas.width = matCanvas.height = size;
  var matContext = matCanvas.getContext('2d');
  // create exture object from canvas.
  var texture = new THREE.Texture(matCanvas);
  // Draw a circle
  var center = size / 2;
  matContext.beginPath();
  matContext.arc(center, center, size/2, 0, 2 * Math.PI, false);
  matContext.closePath();
  matContext.fillStyle = color;
  matContext.fill();
  // need to set needsUpdate
  texture.needsUpdate = true;
  // return a texture made from the canvas
  return texture;
}
function acosF(x) {
  return (Math.acos(2*x-1))/Math.PI
}
var colorF = {}
colorF.r = function(x) {
  return -x + 1
  //return acosF(1-acosF(x))
}
colorF.g = function(x) {
  return -1.5 * x + 1
}
colorF.b = function(x) {
  return -2 * x + 1
}
